<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Journey — Главная</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f4f4f9;
        --text-primary: #1d1d1f;
        --text-secondary: #6e6e73;
        --accent: #0071e3;
        --glass: rgba(255, 255, 255, 0.7);
        --border: rgba(0, 0, 0, 0.1);
        --card-shadow: 0 8px 32px rgba(0,0,0,0.05);
      }

      [data-theme='dark'] {
        --bg-primary: #000000;
        --bg-secondary: #1c1c1e;
        --text-primary: #f5f5f7;
        --text-secondary: #86868b;
        --accent: #0a84ff;
        --glass: rgba(28, 28, 30, 0.7);
        --border: rgba(255, 255, 255, 0.1);
        --card-shadow: 0 8px 32px rgba(0,0,0,0.4);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-x: hidden;
      }

      /* Custom Cursor */
      .cursor {
        width: 20px;
        height: 20px;
        border: 2px solid var(--accent);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transition: transform 0.1s ease;
        display: none;
      }

      @media (pointer: fine) { .cursor { display: block; } }

      /* Navbar */
      .nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 1.5rem 2rem;
        background: var(--glass);
        backdrop-filter: blur(20px);
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border);
      }

      .nav__logo { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
      .nav__links { display: flex; gap: 2rem; list-style: none; }
      .nav__link { text-decoration: none; color: var(--text-primary); font-weight: 500; font-size: 0.9rem; opacity: 0.7; transition: 0.3s; }
      .nav__link:hover, .nav__link.active { opacity: 1; color: var(--accent); }

      /* Theme Toggle */
      .theme-toggle {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        width: 50px;
        height: 26px;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        padding: 4px;
      }

      .theme-toggle__circle {
        width: 18px;
        height: 18px;
        background: var(--accent);
        border-radius: 50%;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      [data-theme='dark'] .theme-toggle__circle { transform: translateX(24px); }

      /* Hero */
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
        background: radial-gradient(circle at center, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      }

      .hero__title { font-size: clamp(3rem, 10vw, 8rem); font-weight: 900; line-height: 0.9; margin-bottom: 1.5rem; }
      .hero__subtitle { font-size: 1.2rem; color: var(--text-secondary); max-width: 600px; }

      /* Sections */
      .section { padding: 8rem 2rem; max-width: 1200px; margin: 0 auto; }
      .section__title { font-size: 2.5rem; margin-bottom: 3rem; }

      /* Cards */
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
      .card {
        background: var(--bg-secondary);
        border-radius: 24px;
        padding: 2rem;
        border: 1px solid var(--border);
        transition: 0.4s;
        text-decoration: none;
        color: inherit;
      }
      .card:hover { transform: translateY(-10px); box-shadow: var(--card-shadow); border-color: var(--accent); }

      /* Progress Bar */
      .progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: var(--accent);
        z-index: 1001;
        width: 0%;
      }

      @media (max-width: 768px) {
        .nav__links { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="cursor"></div>
    <div class="progress"></div>

    <nav class="nav">
      <div class="nav__logo">DEZHLANI</div>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link active">Главная</a></li>
        <li><a href="projects.html" class="nav__link">Проекты</a></li>
        <li><a href="about.html" class="nav__link">Обо мне</a></li>
      </ul>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <div class="theme-toggle__circle"></div>
      </button>
    </nav>

    <header class="hero">
      <h1 class="hero__title">Creative<br>Developer</h1>
      <p class="hero__subtitle">Создаю современные цифровые интерфейсы с упором на эстетику и производительность.</p>
    </header>

    <main>
      <section class="section">
        <h2 class="section__title">Избранное</h2>
        <div class="grid">
          <a href="projects.html" class="card">
            <h3>Проекты</h3>
            <p>Взгляните на мои последние работы в вебе.</p>
          </a>
          <a href="about.html" class="card">
            <h3>Обо мне</h3>
            <p>Моя история, навыки и жизненный путь.</p>
          </a>
        </div>
      </section>
    </main>

    <script>
      // Cursor Logic
      const cursor = document.querySelector('.cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });

      // Progress Bar
      window.addEventListener('scroll', () => {
        const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = (winScroll / height) * 100;
        document.querySelector('.progress').style.width = scrolled + "%";
      });

      // Theme Toggle Logic
      function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      }

      // Init Theme
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.body.setAttribute('data-theme', savedTheme);
    </script>
  </body>
</html>
